apiVersion: v1
kind: Service
metadata:
  name: go-reward-svc
spec:
  selector:
    app: go-reward-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-reward-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: go-reward-server
  template:
    metadata:
      labels:
        app: go-reward-server
    spec:
      # CRITICAL: This enables gVisor isolation for untrusted code
      runtimeClassName: gvisor 
      nodeSelector:
        # Ensures it stays away from your expensive GPU nodes
        cloud.google.com/gke-nodepool: sandbox 
      containers:
      - name: reward-server
        image: us-central1-docker.pkg.dev/my-project-4-386519/rl-pipeline/reward-server:v1
        # Forces Kubernetes to pull the latest version of :v1 every time
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        # Mount /tmp as emptyDir so compiled binaries don't fill up the root disk
        volumeMounts:
        - name: tmp-storage
          mountPath: /tmp
      volumes:
      - name: tmp-storage
        emptyDir: {}