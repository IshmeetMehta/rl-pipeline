# Examples/configs/grpo_math_1B.yaml
defaults:
  - grpo_math_1B  # Inherit from base 1B config if available
  - _self_

# Policy Model (The one being trained)
policy:
  model_name: "/mount/gcs/models/qwen-1.5b" # Path from your GCS Fuse mount
  tokenizer:
    name: "/mount/gcs/qwen2.5-Coder-1.5B"
  precision: bf16 # Crucial for L4 GPUs
  generation:
    max_length: 512
    num_rollouts: 8 # Number of code variations per prompt (GRPO Group Size)
    temperature: 0.7

# Data Configuration
data:
  dataset_name: "ResponseDataset" # NeMo's loader for JSONL files
  train_data_path: "/mount/gcs/dataset/train.jsonl"
  input_key: "input" # Matches your JSONL key
  max_seq_length: 1024

# Environment / Reward Configuration
env:
  name: "http" # Bridge to your Go Reward Server
  reward_url: "http://go-reward-svc/verify"
  timeout: 30

# Training Hyperparameters
trainer:
  num_nodes: 2 # Matches your RayCluster worker count
  devices: 1   # GPUs per node
  global_batch_size: 16
  learning_rate: 1e-6
  epochs: 1

# Checkpointing
checkpointing:
  checkpoint_dir: "/mount/gcs/results/qwen-1.5b-grpo"
  save_every_n_steps: 100