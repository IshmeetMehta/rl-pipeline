apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: nemo-rl-grpo-cluster
  namespace: default
spec:
  rayVersion: '2.40.0'
  
  ##############################################################################
  # HEAD NODE
  ##############################################################################
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
      num-cpus: '1'
    template:
      metadata:
        annotations:
          gke-gcsfuse/volumes: "true"
          # --- GCS FUSE SIDECAR TUNING ---
          gke-gcsfuse/cpu-limit: "2"
          gke-gcsfuse/memory-limit: "4Gi"
          gke-gcsfuse/ephemeral-storage-limit: "50Gi"
        labels:
          ray.io/node-type: head
      spec:
        serviceAccountName: nemo-ksa
        nodeSelector:
          cloud.google.com/gke-nodepool: ray-head-pool
        containers:
        - name: ray-head
          image: nvcr.io/nvidia/nemo-rl:v0.5.0
          resources:
            limits:
              cpu: "30"
              memory: "115Gi"
            requests:
              cpu: "28"
              memory: "110Gi"
          volumeMounts:
          - name: gcs-fuse-data
            mountPath: /mount/gcs
          - name: dshm
            mountPath: /dev/shm
        volumes:
        - name: gcs-fuse-data
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              # --- 1. POINT TO NEW HNS BUCKET ---
              bucketName: "dataset-golang-exp" 
              # --- 2. APPLY AI/ML PERFORMANCE CACHING FLAGS ---
              mountOptions: "implicit-dirs"
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "60Gi"

  ##############################################################################
  # WORKER NODES
  ##############################################################################
  workerGroupSpecs:
  - groupName: dual-l4-workers
    replicas: 2
    minReplicas: 2
    maxReplicas: 2
    rayStartParams:
      num-gpus: "2"
    template:
      metadata:
        annotations:
          gke-gcsfuse/volumes: "true"
          # --- GCS FUSE SIDECAR TUNING ---
          gke-gcsfuse/cpu-limit: "2"
          gke-gcsfuse/memory-limit: "4Gi"
          gke-gcsfuse/ephemeral-storage-limit: "50Gi"
        labels:
          ray.io/node-type: worker
      spec:
        serviceAccountName: nemo-ksa
        nodeSelector:
          cloud.google.com/gke-nodepool: gpu-multi-worker-pool
          cloud.google.com/gke-accelerator: nvidia-l4
        tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "sku"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
        containers:
        - name: ray-worker
          image: nvcr.io/nvidia/nemo-rl:v0.5.0
          resources:
            limits:
              nvidia.com/gpu: 2
              cpu: "22"
              memory: "88Gi"
            requests:
              nvidia.com/gpu: 2
              cpu: "20"
              memory: "80Gi"
          env:
          - name: NCCL_DEBUG
            value: "INFO"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          volumeMounts:
          - name: gcs-fuse-data
            mountPath: /mount/gcs
          - name: dshm
            mountPath: /dev/shm
        volumes:
        - name: gcs-fuse-data
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              # --- 1. POINT TO NEW HNS BUCKET ---
              bucketName: "dataset-golang-exp"
              # --- 2. APPLY AI/ML PERFORMANCE CACHING FLAGS ---
              mountOptions: "implicit-dirs"
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "40Gi"