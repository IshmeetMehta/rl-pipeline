apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: nemo-rl-grpo-cluster
  namespace: default
spec:
  rayVersion: '2.40.0'
  
  ##############################################################################
  # HEAD NODE
  ##############################################################################
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
      num-cpus: '1'
    template:
      metadata:
        annotations:
          gke-gcsfuse/volumes: "true"
          gke-gcsfuse/cpu-limit: "2"
          gke-gcsfuse/memory-limit: "4Gi"
          gke-gcsfuse/ephemeral-storage-limit: "50Gi"
        labels:
          ray.io/node-type: head
      spec:
        serviceAccountName: nemo-ksa
        nodeSelector:
          cloud.google.com/gke-nodepool: ray-head-pool
        containers:
        # 1. Main Ray Head Container
        - name: ray-head
          image: nvcr.io/nvidia/nemo-rl:v0.5.0
          resources:
            limits:
              cpu: "30"
              memory: "115Gi"
            requests:
              cpu: "24"
              memory: "90Gi"
          # lifecycle:
          #   postStart:
          #     exec:
          #       command:
          #       - /bin/bash
          #       - -c
          #       - "source /opt/nemo_rl_venv/bin/activate && uv pip install --link-mode=copy --force-reinstall 'ray[default]'"
          volumeMounts:
          - name: gcs-fuse-data
            mountPath: /mount/gcs
          - name: dshm
            mountPath: /dev/shm
        
        # 2. TensorBoard Sidecar
        - name: tensorboard
          image: nvcr.io/nvidia/nemo-rl:v0.5.0
          command: ["/bin/bash", "-c"]
          args: ["source /opt/nemo_rl_venv/bin/activate && tensorboard --logdir /mount/gcs/logs --host 0.0.0.0 --port 6006"]
          ports:
          - containerPort: 6006
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
          - name: gcs-fuse-data
            mountPath: /mount/gcs
            
        volumes:
        - name: gcs-fuse-data
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: "nemo-rl-experiments-pipeline" 
              mountOptions: "implicit-dirs"
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "60Gi"

  ##############################################################################
  # WORKER NODES (NVIDIA RTX PRO 6000 - G4)
  ##############################################################################
  workerGroupSpecs:
  - groupName: rtx-pro-6000-workers
    replicas: 2 
    minReplicas: 2
    maxReplicas: 2
    rayStartParams:
      num-gpus: "2"
    template:
      metadata:
        annotations:
          gke-gcsfuse/volumes: "true"
          gke-gcsfuse/cpu-limit: "2"
          gke-gcsfuse/memory-limit: "4Gi"
          gke-gcsfuse/ephemeral-storage-limit: "50Gi"
        labels:
          ray.io/node-type: worker
      spec:
        serviceAccountName: nemo-ksa
        # nodeSelector:
        #   cloud.google.com/gke-nodepool: g4-gpu-worker-pool
        #   cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000
        # FIXED: Added all required tolerations for GPUs and Spot/Preemptible instances
        tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "cloud.google.com/gke-spot"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
          
        containers:
        - name: ray-worker
          image: nvcr.io/nvidia/nemo-rl:v0.5.0
          resources:
            limits:
              nvidia.com/gpu: 2
              cpu: "92"    # G4-standard-96 has 96 vCPUs
              memory: "360Gi" # G4-standard-96 has 384Gi RAM
            requests:
              nvidia.com/gpu: 2
              cpu: "88"
              # FIXED: Lowered to 320Gi to clear the 369GB allocatable ceiling
              memory: "320Gi"
          env:
          - name: NCCL_DEBUG
            value: "INFO"
          - name: NCCL_SOCKET_IFNAME
            value: "eth0"
          volumeMounts:
          - name: gcs-fuse-data
            mountPath: /mount/gcs
          - name: dshm
            mountPath: /dev/shm
        volumes:
        - name: gcs-fuse-data
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: "nemo-rl-experiments-pipeline"
              mountOptions: "implicit-dirs"
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "100Gi"